<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <title>Login | Kitnets Oficial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <!-- External CSS -->
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-2xl rounded-2xl overflow-hidden w-full max-w-5xl grid md:grid-cols-2">

    <!-- LEFT SIDE -->
    <div class="hidden md:flex flex-col justify-center items-center bg-[#789EAB] text-white p-10">
      <h1 class="text-3xl font-bold mb-6">Kitnets Oficial</h1>
      <p class="text-center text-lg ">
        Candidate-se ao sua Kitnet moderna e desfrute de uma vida segura,
        acessível e confortável na cidade.
      </p>
  
    </div>
    

    <!-- RIGHT SIDE -->
    <div class="p-10">

      <!-- Toggle Buttons -->
      <div class="flex justify-center mb-8">
        <button type="button" id="showLogin" class="px-4 py-2 font-semibold border-b-2 border-[#789EAB] text-blue-600">
          Login
        </button>

        <button type="button" id="showRegister" class="px-4 py-2 font-semibold text-gray-500">
          Cadastre-se
        </button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="space-y-6" action="javascript:void(0)">
        <div>
          <label class="block mb-2 text-sm font-medium">Email</label>
          <input type="email" name="email" required placeholder="exemplo@email.com"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#789EAB] outline-none">
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium">Senha</label>
          <input type="password" name="password" required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>

        <button type="submit" class="w-full bg-[#789EAB] text-white py-2 rounded-lg hover:bg-[#6f8f9b] transition">
          Login
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="space-y-4 hidden" action="javascript:void(0)">
        <div>
          <label class="block mb-2 text-sm font-medium">Nome Completo</label>
          <input type="text" name="fullName" required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium">Email</label>
          <input type="email" name="email" required placeholder="exemplo@email.com"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#789EAB] outline-none">
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium">Senha</label>
          <input type="password" name="password" required minlength="6"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium">Telefone</label>
          <input type="text" name="phone" required onkeypress="return event.charCode >= 48 && event.charCode <= 57"
            oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 11)"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium">CPF</label>
          <input type="tel" id="cpf" name="cpf" maxlength="11" inputmode="numeric" placeholder="Apenas 11 números"
            required onkeypress="return event.charCode >= 48 && event.charCode <= 57"
            oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0, 11)"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium">Renda Mensal</label>
          <input type="number" name="income" required
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>

        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
          Cadastre-se
        </button>
      </form>

      <!-- Back to Home -->
      <div class="text-center mt-6">
        <a href="../frontend/index.html" class="text-sm text-gray-500 hover:text-blue-600">
          ← Voltar para a Página Inicial
        </a>
      </div>

    </div>
  </div>

  <!-- ✅ Correct path (because this file is inside /pages) -->
  <script src="../js/auth.js"></script>
</body>

</html>
